<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<title>AI Forex Agent Mobile Login</title>





<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0ea5e9",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0a0e17",
                        "surface-dark": "#111827",
                        "border-dark": "#1e293b",
                        "sidebar-dark": "#0f1320",
                        "success": "#10b981",
                        "danger": "#ef4444",
                        "warning": "#f59e0b",
                        "info": "#06b6d4",
                        "purple": "#a855f7"
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "0.75rem", "xl": "1rem", "2xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(17, 24, 39, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(30, 41, 59, 0.8);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col antialiased relative overflow-x-hidden">
<!-- Decorative background elements -->
<div class="absolute inset-0 z-0 opacity-10 pointer-events-none" style="background-image: linear-gradient(0deg, transparent 24%, rgba(255, 255, 255, .3) 25%, rgba(255, 255, 255, .3) 26%, transparent 27%, transparent 74%, rgba(255, 255, 255, .3) 75%, rgba(255, 255, 255, .3) 76%, transparent 77%, transparent), linear-gradient(90deg, transparent 24%, rgba(255, 255, 255, .3) 25%, rgba(255, 255, 255, .3) 26%, transparent 27%, transparent 74%, rgba(255, 255, 255, .3) 75%, rgba(255, 255, 255, .3) 76%, transparent 77%, transparent); background-size: 50px 50px;"></div>
<div class="relative z-10 flex h-full min-h-screen w-full flex-col p-6 items-center justify-center max-w-md mx-auto">
<!-- Branding Header -->
<div class="flex w-full flex-col gap-4 items-center mb-8">
<div class="flex gap-4 flex-col items-center">
<div class="flex items-center justify-center rounded-full bg-primary/20 p-4 mb-2 shadow-[0_0_30px_rgba(14,165,233,0.3)]">
<span class="material-symbols-outlined text-primary text-5xl">smart_toy</span>
</div>
<div class="flex flex-col items-center justify-center">
<p class="text-slate-900 dark:text-white text-2xl font-bold leading-tight tracking-tight text-center">AI Forex Agent</p>
<p class="text-text-muted text-sm font-medium leading-normal text-center mt-1">Intelligent Trading â€¢ Automated Analysis</p>
</div>
</div>
</div>
<!-- Login Card -->
<div class="w-full glass-card rounded-2xl p-6 shadow-2xl flex flex-col gap-5">
<h1 class="text-slate-900 dark:text-white text-xl font-bold leading-tight tracking-tight text-left pb-1">Sign In</h1>
<!-- Email/Username Input -->
<label class="flex flex-col w-full">
<span class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-1.5">Email/Username</span>
<input class="form-input flex w-full resize-none overflow-hidden rounded-xl text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary border border-card-border bg-input-bg h-12 placeholder:text-text-muted p-4 text-base transition-colors" placeholder="Enter your email or username" type="text"/>
</label>
<!-- Password Input -->
<label class="flex flex-col w-full">
<span class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-1.5">Password</span>
<div class="flex w-full items-stretch rounded-xl border border-card-border bg-input-bg focus-within:ring-2 focus-within:ring-primary transition-colors">
<input class="form-input flex w-full min-w-0 resize-none overflow-hidden rounded-xl rounded-r-none border-none text-slate-900 dark:text-white bg-transparent focus:outline-none focus:ring-0 h-12 placeholder:text-text-muted p-4 text-base" placeholder="Enter your password" type="password" value="secretpassword"/>
<button class="text-text-muted flex items-center justify-center px-4 hover:text-slate-300 transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</label>
<!-- Options Row -->
<div class="flex items-center justify-between w-full pt-1 pb-2">
<label class="flex items-center gap-2 cursor-pointer group">
<div class="relative flex h-5 w-5 items-center justify-center rounded border border-card-border bg-input-bg group-hover:border-primary transition-colors">
<input checked="" class="peer invisible absolute" type="checkbox"/>
<span class="material-symbols-outlined text-[16px] text-white opacity-0 peer-checked:opacity-100 absolute bg-primary rounded w-full h-full flex items-center justify-center transition-opacity">check</span>
</div>
<span class="text-text-muted text-sm font-medium select-none">Remember me</span>
</label>
<a class="text-primary hover:text-primary-gradient text-sm font-medium transition-colors" href="#">Forgot password?</a>
</div>
<!-- Sign In Button -->
<button class="w-full h-[52px] mt-2 rounded-xl bg-gradient-primary text-white font-bold text-base shadow-[0_4px_14px_0_rgba(14,165,233,0.39)] hover:shadow-[0_6px_20px_rgba(14,165,233,0.23)] hover:-translate-y-0.5 transition-all duration-200">
                Sign In
            </button>
</div>
<!-- Footer -->
<div class="mt-auto pt-8 pb-4">
<p class="text-text-muted text-xs font-medium text-center opacity-70">Powered by Gemini AI &amp; OANDA v20</p>
</div>
</div>
</body></html>
