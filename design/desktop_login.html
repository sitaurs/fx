<!DOCTYPE html>

<!-- Login Container -->
<div class="relative z-10 w-full max-w-[420px] px-6 py-10 mx-4 backdrop-blur-xl bg-white/80 dark:bg-slate-900/60 border border-slate-200 dark:border-border-dark rounded-2xl shadow-2xl">

<!-- Login Form -->

</div>
<input class="block w-full pl-10 pr-4 py-3 bg-white dark:bg-slate-950/50 border border-slate-200 dark:border-border-dark rounded-xl text-slate-900 dark:text-white placeholder-slate-400 focus:ring-2 focus:ring-primary focus:border-primary transition-colors sm:text-sm" id="username" name="username" placeholder="Enter your email or username" type="text"/>
</div>
</div>
<!-- Password -->
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5 ml-1" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
<span class="material-symbols-outlined text-xl">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-3 bg-white dark:bg-slate-950/50 border border-slate-200 dark:border-border-dark rounded-xl text-slate-900 dark:text-white placeholder-slate-400 focus:ring-2 focus:ring-primary focus:border-primary transition-colors sm:text-sm" id="password" name="password" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" type="password"/>

<div class="flex items-center">
<input class="h-4 w-4 rounded border-slate-300 dark:border-slate-700 text-primary focus:ring-primary bg-white dark:bg-slate-950" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-slate-600 dark:text-slate-400 cursor-pointer" for="remember-me">
                        Remember me
                    </label>
</div>
<div class="text-sm">
<a class="font-medium text-primary hover:text-primary/80 transition-colors" href="#">

<button class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-xl shadow-sm text-sm font-semibold text-white bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary focus:ring-offset-background-light dark:focus:ring-offset-background-dark transition-all duration-200 shadow-primary/20 hover:shadow-primary/40" type="submit">

<!-- Footer -->
